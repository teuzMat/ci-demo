<!DOCTYPE html>
<html>
<head>
  <title>CI Demo</title>
</head>
<body>
  <h1>Calculadora Simples</h1>

  <input id="a" type="number" placeholder="Número A">
  <input id="b" type="number" placeholder="Número B">
  <button onclick="calcular()">Somar</button>

  <h2 id="resultado"></h2>

  <script>
    async function calcular() {
      const a = document.getElementById('a').value;
      const b = document.getElementById('b').value;

      const res = await fetch(`/sum?a=${a}&b=${b}`);
      const data = await res.json();

      document.getElementById('resultado').innerText = "Resultado: " + data.result;
    }
  </script>
</body>
</html>
